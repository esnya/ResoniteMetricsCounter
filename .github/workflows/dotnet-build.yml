name: Build

on:
  push:
    branches: ["master", "feature/ci"]
    tags:
      - 'v*'
  workflow_call:
  workflow_dispatch:

env:
  project: ResoniteMetricsCounter
  artifact: ResoniteMetricsCounter.dll

jobs:
  vtag:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Find csproj file
        id: find_csproj
        run: |
          FILE=$(find . -name "*.csproj" | head -n 1)
          echo "::set-output name=FILE::$FILE"

      - name: Get version from csproj
        id: get_version
        run: |
          VERSION=$(grep -oPm1 "(?<=<Version>)[^<]+" ${{ steps.find_csproj.outputs.FILE }})
          echo "::set-output name=VERSION::$VERSION"

      - name: Pull tags
        run: git fetch --tags

      - name: Check if tag exists
        id: check_tag
        run: |
          TAG_EXISTS=$(git tag -l "v${{ steps.get_version.outputs.VERSION }}")
          echo "::set-output name=TAG_EXISTS::$TAG_EXISTS"

      - name: Create tag
        if: steps.check_tag.outputs.TAG_EXISTS == ''
        run: |
          git config --local user.name "github-actions[bot]"
          git config --local user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag "v${{ steps.get_version.outputs.VERSION }}"
          git push origin "v${{ steps.get_version.outputs.VERSION }}"
    outputs:
      tagged: ${{ steps.check_tag.outputs.TAG_EXISTS == '' }}
      tag: v${{ steps.get_version.outputs.VERSION }}

  build:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Setup Resonite environment
      id: build-env
      uses: resonite-modding-group/setup-resonite-env-action@v0.1.0
      with:
        steam-user: ${{ secrets.STEAMUSER }}
        steam-password: ${{ secrets.STEAMPASS }}

    - name: Install ResoniteModLoader and Harmony
      shell: bash
      run: |
        set -euo pipefail
        LIBS_PATH="${{ steps.build-env.outputs.libraries-path }}"
        RESONITE_DIR="$(dirname "${LIBS_PATH}")"
        mkdir -p "${LIBS_PATH}" "${RESONITE_DIR}/rml_libs"
        curl -fsSL -o "${LIBS_PATH}/ResoniteModLoader.dll" \
          https://github.com/resonite-modding-group/ResoniteModLoader/releases/latest/download/ResoniteModLoader.dll
        if ! curl -fsSL -o "${RESONITE_DIR}/rml_libs/0Harmony.dll" \
          https://github.com/resonite-modding-group/ResoniteModLoader/releases/latest/download/0Harmony.dll; then
          curl -fsSL -o "${RESONITE_DIR}/0Harmony.dll" \
            https://github.com/resonite-modding-group/ResoniteModLoader/releases/latest/download/0Harmony.dll
        fi

    - name: Build (net9.0)
      shell: bash
      run: |
        set -euo pipefail
        LIBS_PATH="${{ steps.build-env.outputs.libraries-path }}"
        RESONITE_DIR="$(dirname "${LIBS_PATH}")/"
        dotnet build "${{ github.workspace }}/${{ env.project }}/${{ env.project }}.csproj" -c Release -p:ResonitePath="${RESONITE_DIR}"

    - name: Upload build artifacts
      uses: actions/upload-artifact@v4
      with:
        name: ${{ env.artifact }}
        path: ${{ env.project }}/bin/Release/net9.0/${{ env.artifact }}

  release:
    if: startsWith(github.ref, 'refs/tags/v') || needs.vtag.outputs.tagged
    needs:
      - vtag
      - build
    runs-on: ubuntu-latest
    steps:
    - name: Compute tag and prerelease flag
      id: vars
      shell: bash
      env:
        RAW_TAG: ${{ needs.vtag.outputs.tagged && needs.vtag.outputs.tag || github.ref_name }}
      run: |
        echo "tag=${RAW_TAG}" >> "$GITHUB_OUTPUT"
        if [[ "${RAW_TAG}" == *-* ]]; then
          echo "prerelease=true" >> "$GITHUB_OUTPUT"
        else
          echo "prerelease=false" >> "$GITHUB_OUTPUT"
        fi
    - name: Checkout
      uses: actions/checkout@v4
      with:
        ref:  ${{ steps.vars.outputs.tag }}
        fetch-depth: 0
    - name: Download Artifacts
      uses: actions/download-artifact@v4
      with:
        name: ${{ env.artifact }}
    - name: Release
      uses: softprops/action-gh-release@v2
      with:
        files: |
          ${{ env.artifact }}
        generate_release_notes: true
        tag_name: ${{ steps.vars.outputs.tag }}
        prerelease: ${{ steps.vars.outputs.prerelease }}
